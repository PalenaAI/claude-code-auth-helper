name: release

# Cut a GitHub Release with cross-compiled binaries whenever a v-prefixed tag is
# pushed, e.g.  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Verify (vet + tests)
        run: |
          go vet ./...
          go test ./...

      - name: Build release artifacts
        run: make package VERSION="${GITHUB_REF_NAME}"

      - name: Extract release notes from CHANGELOG
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v tag="## [$ver]" '
            index($0, tag) == 1 { flag = 1; next }
            flag && index($0, "## [") == 1 { flag = 0 }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "Extracted notes:"; cat RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease=""
          case "${GITHUB_REF_NAME}" in *-*) prerelease="--prerelease" ;; esac
          if [ -s RELEASE_NOTES.md ]; then
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --title "${GITHUB_REF_NAME}" \
              --notes-file RELEASE_NOTES.md $prerelease
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes $prerelease
          fi
