name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true       # pull the latest patch of the go.mod minor
          cache: true
      - name: gofmt
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "::error::gofmt needed on:"; echo "$files"; exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test -race ./...

  license-header:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Apache license headers
        uses: apache/skywalking-eyes/header@v0.7.0

  govulncheck:
    runs-on: ubuntu-latest
    # Advisory only: Go standard-library advisories are remediated by bumping the
    # toolchain, not by changing this code, so a pending stdlib CVE must not block
    # CI. The scan still runs and its findings are visible on the job.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
